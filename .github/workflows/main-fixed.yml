name: L7 Smart Checker (Matrix) - FIXED
on:
  schedule:
    - cron: '17 */1 * * *' # Запуск каждый час
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose debug output'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  prepare-inputs:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch All Node Lists
        run: |
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/ultra_elite.txt" -o ultra_elite_raw.txt
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/business.txt" -o business_raw.txt

      - name: Combine and Split Lists
        run: |
          cat ultra_elite_raw.txt business_raw.txt > combined_input_full.txt
          sed -i '/^$/d' combined_input_full.txt
          CHUNK_SIZE=600
          mkdir -p input_chunks
          split -l $CHUNK_SIZE combined_input_full.txt input_chunks/chunk_
          echo "Created chunks:"
          ls -la input_chunks/

      - name: Generate Matrix JSON
        id: set-matrix
        run: |
          python3 -c '
          import os, json
          files = sorted([f for f in os.listdir("input_chunks") if f.startswith("chunk_")])
          matrix = [{"input_file": f} for f in files]
          print(f"matrix_json={json.dumps(matrix)}")
          ' >> $GITHUB_OUTPUT

      - name: Upload Input Chunks
        uses: actions/upload-artifact@v4
        with:
          name: input-chunks
          path: input_chunks/
          retention-days: 1

  check-chunks:
    needs: prepare-inputs
    runs-on: ubuntu-latest
    # === ИСПРАВЛЕНО: добавлен timeout ===
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-inputs.outputs.matrix_json) }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Download Input Chunks
        uses: actions/download-artifact@v4
        with:
          name: input-chunks
          path: input_chunks

      # === ИСПРАВЛЕНО: Go 1.22 вместо 1.21 ===
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # Отключаем кэш, т.к. нет go.sum

      - name: Setup Warp
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual

      # === ИСПРАВЛЕНО: проверка что Warp работает ===
      - name: Verify Warp Connection
        run: |
          echo "Testing Warp connectivity..."
          for i in 1 2 3; do
            if curl -s4m5 --retry 2 https://www.gstatic.com/generate_204 -o /dev/null; then
              echo "✅ Warp is working (attempt $i)"
              break
            fi
            echo "⚠️ Warp not ready, waiting... (attempt $i)"
            sleep 2
          done

      - name: Fetch Whitelist
        run: |
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/target_sni.txt" -o whitelist.txt || touch whitelist.txt

      - name: Prepare Input File
        run: |
          cp "input_chunks/${{ matrix.input_file }}" input.txt
          echo "Processing ${{ matrix.input_file }} with $(wc -l < input.txt) lines"

      - name: Build and Run Checker
        run: |
          go mod init checker || true
          
          # === ИСПРАВЛЕНО: фиксируем версию golang.org/x/net ===
          go get github.com/oschwald/geoip2-golang@latest
          go get golang.org/x/net@v0.23.0  # Фиксированная версия для Go 1.22
          go mod tidy

          go build -o checker main.go
          chmod +x checker

          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="-verbose"
            echo "🔊 Verbose mode ENABLED"
          fi

          ./checker -input input.txt -whitelist whitelist.txt $VERBOSE_FLAG

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.input_file }}
          path: |
            uf.txt
            fast.txt
            norm.txt
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Debug Log (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.input_file }}
          path: xray_debug.log
          retention-days: 1
          if-no-files-found: ignore

  combine-results:
    needs: [prepare-inputs, check-chunks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all_results
          merge-multiple: false

      - name: Combine Files
        run: |
          touch uf.txt fast.txt norm.txt
          find all_results -name "uf.txt" -exec cat {} + >> uf.txt
          find all_results -name "fast.txt" -exec cat {} + >> fast.txt
          find all_results -name "norm.txt" -exec cat {} + >> norm.txt

          echo "Combined stats:"
          wc -l uf.txt fast.txt norm.txt

      - name: Push to HPP Repo
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/shrau77/hpp.git target_repo
          cd target_repo
          git config user.name "L7-Matrix-Bot"
          git config user.email "bot@github.com"

          cp ../uf.txt .
          cp ../fast.txt .
          cp ../norm.txt .

          git add uf.txt fast.txt norm.txt
          git commit -m "L7 Matrix Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push

      - name: Send Telegram Notification
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          UF=$(grep -c "://" uf.txt || echo 0)
          FAST=$(grep -c "://" fast.txt || echo 0)
          NORM=$(grep -c "://" norm.txt || echo 0)

          MESSAGE="🚀 *L7 Matrix Check Results* 🚀%0A%0A💎 *Ultra Fast:* $UF%0A⚡ *Fast:* $FAST%0A✅ *Normal:* $NORM%0A%0A📦 _Results pushed to HPP_"

          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
