name: L7 Checker V2 (TSPU Check)
on:
  schedule:
    - cron: '47 */2 * * *' # Запуск каждые 2 часа (смещение относительно v1)
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose debug output'
        required: false
        default: 'true'
        type: boolean
      strong_mode:
        description: 'Enable strong mode (N consecutive requests)'
        required: false
        default: 'true'
        type: boolean
      https_check:
        description: 'Require HTTPS connectivity check'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  prepare-inputs:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch All Node Lists
        run: |
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/ultra_elite.txt" -o ultra_elite_raw.txt
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/business.txt" -o business_raw.txt

      - name: Combine and Split Lists
        run: |
          cat ultra_elite_raw.txt business_raw.txt > combined_input_full.txt
          sed -i '/^$/d' combined_input_full.txt
          
          # V2 работает строже - меньше чанк, т.к. проверка дольше
          CHUNK_SIZE=400
          mkdir -p input_chunks
          split -l $CHUNK_SIZE combined_input_full.txt input_chunks/chunk_
          
          echo "Created chunks:"
          ls -la input_chunks/

      - name: Generate Matrix JSON
        id: set-matrix
        run: |
          python3 -c '
          import os, json
          files = sorted([f for f in os.listdir("input_chunks") if f.startswith("chunk_")])
          matrix = [{"input_file": f} for f in files]
          print(f"matrix_json={json.dumps(matrix)}")
          ' >> $GITHUB_OUTPUT

      - name: Upload Input Chunks
        uses: actions/upload-artifact@v4
        with:
          name: input-chunks-v2
          path: input_chunks/
          retention-days: 1

  check-chunks:
    needs: prepare-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 15  # Ограничиваем параллелизм для V2
      matrix:
        include: ${{ fromJson(needs.prepare-inputs.outputs.matrix_json) }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Download Input Chunks
        uses: actions/download-artifact@v4
        with:
          name: input-chunks-v2
          path: input_chunks

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Warp
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual

      - name: Wait for Warp to stabilize
        run: |
          echo "⏳ Waiting for Warp to stabilize..."
          sleep 5
          echo "Testing connectivity..."
          for i in 1 2 3; do
            if curl -s4m10 https://www.gstatic.com/generate_204 -o /dev/null; then
              echo "✅ Warp is working (attempt $i)"
              break
            fi
            echo "⚠️ Attempt $i failed, waiting..."
            sleep 3
          done

      - name: Fetch Whitelist
        run: |
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/target_sni.txt" -o whitelist.txt || touch whitelist.txt

      - name: Prepare Input File
        run: |
          cp "input_chunks/${{ matrix.input_file }}" input.txt
          echo "Processing ${{ matrix.input_file }} with $(wc -l < input.txt) lines"

      - name: Build V2 Checker (TSPU Edition)
        run: |
          cd v2-tspu-check
          
          # Создаём go.mod если нет
          if [ ! -f go.mod ]; then
            go mod init checker-v2
            go get github.com/oschwald/geoip2-golang@v1.9.0
            go get golang.org/x/net@v0.23.0
            go mod tidy
          fi

          go build -o checker-v2 main.go
          chmod +x checker-v2
          cp checker-v2 ..

      - name: Run V2 Checker with TSPU Checks
        run: |
          # Формируем флаги
          VERBOSE_FLAG=""
          STRONG_FLAG=""
          HTTPS_FLAG=""
          
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="-verbose"
            echo "🔊 Verbose mode ENABLED"
          fi
          
          if [ "${{ inputs.strong_mode }}" = "true" ]; then
            STRONG_FLAG="-strong"
            echo "💪 Strong mode ENABLED (3 consecutive requests)"
          fi
          
          if [ "${{ inputs.https_check }}" = "true" ]; then
            HTTPS_FLAG="-https"
            echo "🔒 HTTPS check ENABLED"
          fi

          echo ""
          echo "=============================================="
          echo "🚀 Running V2 TSPU Check"
          echo "   Strong Mode: ${{ inputs.strong_mode }}"
          echo "   HTTPS Check: ${{ inputs.https_check }}"
          echo "=============================================="
          echo ""
          
          ./checker-v2 -input input.txt -whitelist whitelist.txt $VERBOSE_FLAG $STRONG_FLAG $HTTPS_FLAG

      - name: Upload Results V2
        uses: actions/upload-artifact@v4
        with:
          name: results-v2-${{ matrix.input_file }}
          path: |
            uf_v2.txt
            fast_v2.txt
            norm_v2.txt
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Debug Log V2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-v2-${{ matrix.input_file }}
          path: |
            xray_debug.log
            v2-tspu-check/xray_debug.log
          retention-days: 1
          if-no-files-found: ignore

  combine-results:
    needs: [prepare-inputs, check-chunks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Results V2
        uses: actions/download-artifact@v4
        with:
          pattern: results-v2-*
          path: all_results
          merge-multiple: false

      - name: Combine Files V2
        run: |
          touch uf_v2.txt fast_v2.txt norm_v2.txt

          find all_results -name "uf_v2.txt" -exec cat {} + >> uf_v2.txt
          find all_results -name "fast_v2.txt" -exec cat {} + >> fast_v2.txt
          find all_results -name "norm_v2.txt" -exec cat {} + >> norm_v2.txt

          echo "Combined V2 stats:"
          wc -l uf_v2.txt fast_v2.txt norm_v2.txt

      - name: Push V2 Results to HPP Repo
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/shrau77/hpp.git target_repo
          cd target_repo
          git config user.name "L7-V2-TSPU-Bot"
          git config user.email "bot@github.com"

          # Создаём папку для v2 если нет
          mkdir -p v2

          cp ../uf_v2.txt v2/
          cp ../fast_v2.txt v2/
          cp ../norm_v2.txt v2/

          # Также копируем в корень как альтернативный источник
          cp ../uf_v2.txt .
          cp ../fast_v2.txt .
          cp ../norm_v2.txt .

          git add v2/ uf_v2.txt fast_v2.txt norm_v2.txt
          git commit -m "V2 TSPU Check Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push

      - name: Send Telegram Notification V2
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          UF=$(grep -c "://" uf_v2.txt || echo 0)
          FAST=$(grep -c "://" fast_v2.txt || echo 0)
          NORM=$(grep -c "://" norm_v2.txt || echo 0)

          MESSAGE="🛡️ *L7 V2 TSPU Check Results* 🛡️%0A%0A💎 *Ultra Fast:* $UF%0A⚡ *Fast:* $FAST%0A✅ *Normal:* $NORM%0A%0A🔬 *TSPU-verified nodes*%0A📦 _Results pushed to HPP/v2/_"

          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
