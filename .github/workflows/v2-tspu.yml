name: L7 Checker V2 (TSPU Check - All Protocols)
on:
  schedule:
    - cron: '48 */2 * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose debug output'
        required: false
        default: 'false'
        type: boolean
      strong_mode:
        description: 'Enable strong mode (N consecutive requests)'
        required: false
        default: 'true'
        type: boolean
      https_check:
        description: 'Require HTTPS connectivity check'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  prepare-inputs:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch All Node Lists (All Protocols)
        run: |
          # VLESS/Trojan/SS
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/ultra_elite.txt" -o ultra_elite_raw.txt || true
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/business.txt" -o business_raw.txt || true
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/trojan_only.txt" -o trojan_raw.txt || true
          
          # Hysteria2/TUIC (для V2 - только xray-протоколы)
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/all_mixed.txt" -o all_mixed.txt || true

      - name: Combine and Split Lists
        run: |
          cat ultra_elite_raw.txt business_raw.txt trojan_raw.txt all_mixed.txt 2>/dev/null > combined_input_full.txt || true
          sed -i '/^$/d' combined_input_full.txt
          sort -u combined_input_full.txt -o combined_input_full.txt
          
          TOTAL=$(wc -l < combined_input_full.txt)
          echo "📊 Total unique nodes for V2: $TOTAL"
          
          # V2 работает строже - меньше чанк
          CHUNK_SIZE=400
          mkdir -p input_chunks
          split -l $CHUNK_SIZE combined_input_full.txt input_chunks/chunk_
          
          echo "Created chunks:"
          ls -la input_chunks/

      - name: Generate Matrix JSON
        id: set-matrix
        run: |
          python3 -c '
          import os, json
          files = sorted([f for f in os.listdir("input_chunks") if f.startswith("chunk_")])
          matrix = [{"input_file": f} for f in files]
          print(f"matrix_json={json.dumps(matrix)}")
          ' >> $GITHUB_OUTPUT

      - name: Upload Input Chunks
        uses: actions/upload-artifact@v4
        with:
          name: input-chunks-v2
          path: input_chunks/
          retention-days: 1

  check-chunks:
    needs: prepare-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJson(needs.prepare-inputs.outputs.matrix_json) }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Download Input Chunks
        uses: actions/download-artifact@v4
        with:
          name: input-chunks-v2
          path: input_chunks

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Setup Warp
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual

      - name: Wait for Warp
        run: |
          echo "⏳ Waiting for Warp..."
          sleep 5
          for i in 1 2 3; do
            if curl -s4m10 https://www.gstatic.com/generate_204 -o /dev/null; then
              echo "✅ Warp OK (attempt $i)"
              break
            fi
            echo "⚠️ Attempt $i failed"
            sleep 3
          done

      - name: Fetch SNI Whitelist (synced with zhopa-bobra)
        run: |
          # Скачиваем основной whitelist
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/target_sni.txt" -o whitelist.txt || touch whitelist.txt
          
          # Синхронизируем с zhopa-bobra
          curl -L "https://raw.githubusercontent.com/shrau77/zhopa-bobra/main/results/elite_sni.txt" -o remote_sni.txt || touch remote_sni.txt
          
          # Объединяем
          cat whitelist.txt remote_sni.txt | sort -u > whitelist_combined.txt
          mv whitelist_combined.txt whitelist.txt
          
          echo "📋 Loaded $(wc -l < whitelist.txt) SNI domains"

      - name: Prepare Input File
        run: |
          cp "input_chunks/${{ matrix.input_file }}" input.txt
          echo "Processing ${{ matrix.input_file }}: $(wc -l < input.txt) lines"

      - name: Build V2 Checker
        run: |
          cd v2-tspu-check
          go mod download
          go mod tidy
          go build -o checker-v2 main.go
          chmod +x checker-v2
          cp checker-v2 ..

      - name: Run V2 Checker (TSPU + Anti-Iran)
        run: |
          VERBOSE_FLAG=""
          STRONG_FLAG="-strong"
          HTTPS_FLAG="-https"
          
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="-verbose"
          fi
          
          echo "🚀 V2 TSPU Check - Strong Mode + Anti-Iran Filters"
          echo "   Strong: 3 consecutive requests"
          echo "   HTTPS: gstatic generate_204"
          echo "   Filters: Banned TLDs, Iranian patterns, DDNS"
          
          ./checker-v2 -input input.txt -whitelist whitelist.txt $VERBOSE_FLAG $STRONG_FLAG $HTTPS_FLAG

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-v2-${{ matrix.input_file }}
          path: |
            uf_v2.txt
            fast_v2.txt
            norm_v2.txt
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Debug Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-v2-${{ matrix.input_file }}
          path: xray_debug.log
          retention-days: 1
          if-no-files-found: ignore

  combine-results:
    needs: [prepare-inputs, check-chunks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          pattern: results-v2-*
          path: all_results
          merge-multiple: false

      - name: Combine Files
        run: |
          touch uf_v2.txt fast_v2.txt norm_v2.txt
          
          find all_results -name "uf_v2.txt" -exec cat {} + >> uf_v2.txt || true
          find all_results -name "fast_v2.txt" -exec cat {} + >> fast_v2.txt || true
          find all_results -name "norm_v2.txt" -exec cat {} + >> norm_v2.txt || true
          
          # Убираем дубликаты
          sort -u uf_v2.txt -o uf_v2.txt 2>/dev/null || true
          sort -u fast_v2.txt -o fast_v2.txt 2>/dev/null || true
          sort -u norm_v2.txt -o norm_v2.txt 2>/dev/null || true
          
          echo "V2 Results:"
          wc -l uf_v2.txt fast_v2.txt norm_v2.txt || true

      - name: Push to HPP
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/shrau77/hpp.git target_repo
          cd target_repo
          git config user.name "V2-TSPU-Bot"
          git config user.email "bot@github.com"
          
          mkdir -p v2
          
          cp ../uf_v2.txt v2/ 2>/dev/null || true
          cp ../fast_v2.txt v2/ 2>/dev/null || true
          cp ../norm_v2.txt v2/ 2>/dev/null || true
          
          cp ../uf_v2.txt . 2>/dev/null || true
          cp ../fast_v2.txt . 2>/dev/null || true
          cp ../norm_v2.txt . 2>/dev/null || true
          
          git add v2/ uf_v2.txt fast_v2.txt norm_v2.txt 2>/dev/null || true
          git commit -m "V2 TSPU Update: $(date +'%Y-%m-%d %H:%M') | Anti-Iran Filters" || echo "No changes"
          git push

      - name: Telegram Notification
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          UF=$(grep -c "://" uf_v2.txt 2>/dev/null || echo 0)
          FAST=$(grep -c "://" fast_v2.txt 2>/dev/null || echo 0)
          NORM=$(grep -c "://" norm_v2.txt 2>/dev/null || echo 0)

          MESSAGE="🛡️ *V2 TSPU Results* 🛡️%0A%0A💎 UF: $UF%0A⚡ Fast: $FAST%0A✅ Norm: $NORM%0A%0A🔬 TSPU-verified%0A🚫 Anti-Iran filters"

          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
