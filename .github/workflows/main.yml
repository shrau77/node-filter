name: L7 Smart Checker (Matrix - All Protocols)
on:
  schedule:
    - cron: '16 */1 * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose debug output'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  prepare-inputs:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix_json }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch All Node Lists
        run: |
          # Основные списки из hpp
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/ultra_elite.txt" -o ultra_elite_raw.txt || true
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/business.txt" -o business_raw.txt || true
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/trojan_only.txt" -o trojan_raw.txt || true
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/hysteria2_only.txt" -o hy2_raw.txt || true
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/tuic_only.txt" -o tuic_raw.txt || true
          
          # Backup источники
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/output/all_mixed.txt" -o all_mixed.txt || true

      - name: Combine and Split Lists
        run: |
          # Объединяем все файлы
          cat ultra_elite_raw.txt business_raw.txt trojan_raw.txt hy2_raw.txt tuic_raw.txt all_mixed.txt 2>/dev/null > combined_input_full.txt || true
          
          # Убираем пустые строки и дубликаты
          sed -i '/^$/d' combined_input_full.txt
          sort -u combined_input_full.txt -o combined_input_full.txt
          
          TOTAL_LINES=$(wc -l < combined_input_full.txt)
          echo "📊 Total unique nodes: $TOTAL_LINES"
          
          # Определяем размер блока (500 строк на воркер)
          CHUNK_SIZE=500
          mkdir -p input_chunks
          split -l $CHUNK_SIZE combined_input_full.txt input_chunks/chunk_
          
          echo "Created chunks:"
          ls -la input_chunks/

      - name: Generate Matrix JSON
        id: set-matrix
        run: |
          python3 -c '
          import os, json
          files = sorted([f for f in os.listdir("input_chunks") if f.startswith("chunk_")])
          matrix = [{"input_file": f} for f in files]
          print(f"matrix_json={json.dumps(matrix)}")
          ' >> $GITHUB_OUTPUT

      - name: Upload Input Chunks
        uses: actions/upload-artifact@v4
        with:
          name: input-chunks
          path: input_chunks/
          retention-days: 1

  check-chunks:
    needs: prepare-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-inputs.outputs.matrix_json) }}
    steps:
      - name: Checkout Checker Code
        uses: actions/checkout@v4

      - name: Download Input Chunks
        uses: actions/download-artifact@v4
        with:
          name: input-chunks
          path: input_chunks

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Setup Warp
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual

      - name: Wait for Warp
        run: |
          echo "Waiting for Warp to stabilize..."
          sleep 5
          curl -s4m10 https://www.gstatic.com/generate_204 -o /dev/null && echo "✅ Connectivity OK" || echo "⚠️ Connectivity issues"

      - name: Fetch SNI Whitelist
        run: |
          # Синхронизация с zhopa-bobra
          curl -L "https://raw.githubusercontent.com/shrau77/zhopa-bobra/main/results/elite_sni.txt" -o remote_sni.txt || touch remote_sni.txt
          curl -L "https://raw.githubusercontent.com/shrau77/hpp/main/target_sni.txt" -o local_sni.txt || touch local_sni.txt
          
          # Объединяем
          cat remote_sni.txt local_sni.txt | sort -u > whitelist.txt
          echo "📋 Loaded $(wc -l < whitelist.txt) SNI domains"

      - name: Prepare Input File
        run: |
          cp "input_chunks/${{ matrix.input_file }}" input.txt
          echo "Processing ${{ matrix.input_file }} with $(wc -l < input.txt) lines"

      - name: Build and Run Checker
        run: |
          if [ ! -f go.mod ]; then
            go mod init checker
          fi
          
          go mod download
          go mod tidy
          go build -o checker main.go
          chmod +x checker

          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="-verbose"
            echo "🔊 Verbose mode ENABLED"
          fi

          ./checker -input input.txt -whitelist whitelist.txt $VERBOSE_FLAG

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.input_file }}
          path: |
            uf.txt
            fast.txt
            norm.txt
            hy2.txt
            tuic.txt
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Debug Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.input_file }}
          path: xray_debug.log
          retention-days: 1
          if-no-files-found: ignore

  combine-results:
    needs: [prepare-inputs, check-chunks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all_results
          merge-multiple: false

      - name: Combine Files
        run: |
          touch uf.txt fast.txt norm.txt hy2.txt tuic.txt
          
          find all_results -name "uf.txt" -exec cat {} + 2>/dev/null | sort -u > uf_combined.txt || true
          find all_results -name "fast.txt" -exec cat {} + 2>/dev/null | sort -u > fast_combined.txt || true
          find all_results -name "norm.txt" -exec cat {} + 2>/dev/null | sort -u > norm_combined.txt || true
          find all_results -name "hy2.txt" -exec cat {} + 2>/dev/null | sort -u > hy2_combined.txt || true
          find all_results -name "tuic.txt" -exec cat {} + 2>/dev/null | sort -u > tuic_combined.txt || true
          
          mv uf_combined.txt uf.txt 2>/dev/null || true
          mv fast_combined.txt fast.txt 2>/dev/null || true
          mv norm_combined.txt norm.txt 2>/dev/null || true
          mv hy2_combined.txt hy2.txt 2>/dev/null || true
          mv tuic_combined.txt tuic.txt 2>/dev/null || true
          
          echo "Combined stats:"
          wc -l uf.txt fast.txt norm.txt hy2.txt tuic.txt 2>/dev/null || true

      - name: Push to HPP Repo
        env:
          GTA_TOKEN: ${{ secrets.GTA_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          TOKEN="${GTA_TOKEN:-$PAT_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "❌ No token available"
            exit 1
          fi
          
          git clone https://x-access-token:${TOKEN}@github.com/shrau77/hpp.git target_repo
          cd target_repo
          git config user.name "L7-Matrix-Bot"
          git config user.email "bot@github.com"
          
          git pull origin main || git pull origin master || true

          cp ../uf.txt . 2>/dev/null || true
          cp ../fast.txt . 2>/dev/null || true
          cp ../norm.txt . 2>/dev/null || true
          cp ../hy2.txt . 2>/dev/null || true
          cp ../tuic.txt . 2>/dev/null || true

          git add uf.txt fast.txt norm.txt hy2.txt tuic.txt 2>/dev/null || true
          git commit -m "L7 Matrix Update: $(date +'%Y-%m-%d %H:%M') | All Protocols" || echo "No changes to commit"
          git push origin main || git push origin master

      - name: Send Telegram Notification
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          UF=$(grep -c "://" uf.txt 2>/dev/null || echo 0)
          FAST=$(grep -c "://" fast.txt 2>/dev/null || echo 0)
          NORM=$(grep -c "://" norm.txt 2>/dev/null || echo 0)
          HY2=$(grep -c "://" hy2.txt 2>/dev/null || echo 0)
          TUIC=$(grep -c "://" tuic.txt 2>/dev/null || echo 0)

          MESSAGE="🚀 *L7 Matrix Check Results* 🚀%0A%0A💎 *Ultra Fast:* $UF%0A⚡ *Fast:* $FAST%0A✅ *Normal:* $NORM%0A🚀 *Hysteria2:* $HY2%0A🔷 *TUIC:* $TUIC%0A%0A📦 _Results pushed to HPP_"

          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
